<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>comic-agent | Story Gallery</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Cormorant+Garamond:wght@600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #f4f1ea;
        --ink: #1e1f1c;
        --muted: #5b5f56;
        --line: #d7d2c6;
        --card: #fffdf7;
        --accent: #1c6e64;
        --accent-soft: #d8eee9;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        color: var(--ink);
        font-family: "Space Grotesk", sans-serif;
        background:
          radial-gradient(circle at 12% 18%, #dce7dd 0, transparent 32%),
          radial-gradient(circle at 88% 22%, #f0dfcd 0, transparent 30%),
          radial-gradient(circle at 78% 82%, #d4e2ef 0, transparent 34%),
          var(--bg);
        min-height: 100vh;
      }

      .page-shell {
        max-width: 1120px;
        margin: 0 auto;
        padding: 2.2rem 1rem 3rem;
      }

      .hero {
        background: linear-gradient(140deg, rgba(255, 255, 255, 0.95), rgba(255, 252, 246, 0.8));
        border: 1px solid rgba(30, 31, 28, 0.08);
        border-radius: 20px;
        box-shadow: 0 20px 45px rgba(34, 35, 33, 0.08);
        padding: 1.3rem 1.25rem;
        backdrop-filter: blur(2px);
      }

      .hero-kicker {
        letter-spacing: 0.16em;
        text-transform: uppercase;
        font-size: 0.7rem;
        font-weight: 700;
        color: var(--muted);
      }

      .hero-title {
        margin: 0.35rem 0 0;
        font-family: "Cormorant Garamond", serif;
        font-size: clamp(1.9rem, 3.5vw, 2.8rem);
        line-height: 0.95;
      }

      .control-row {
        display: flex;
        flex-wrap: wrap;
        gap: 0.75rem;
        align-items: end;
      }

      .selector-wrap {
        min-width: 250px;
      }

      .form-label {
        color: var(--muted);
        font-size: 0.75rem;
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }

      .form-select {
        border-radius: 12px;
        border: 1px solid var(--line);
        font-size: 0.95rem;
        padding: 0.55rem 0.8rem;
      }

      .repo-btn {
        border-radius: 12px;
        padding: 0.55rem 0.9rem;
        background: #111;
        color: #fff;
        border: 0;
        text-decoration: none;
        font-size: 0.88rem;
        transition: transform 180ms ease;
      }

      .repo-btn:hover {
        transform: translateY(-1px);
        color: #fff;
      }

      .story-card {
        margin-top: 1rem;
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 16px;
        box-shadow: 0 12px 30px rgba(44, 45, 43, 0.06);
      }

      .story-head {
        display: flex;
        justify-content: space-between;
        gap: 0.75rem;
        align-items: center;
      }

      .story-title {
        margin: 0;
        font-weight: 700;
        letter-spacing: 0.03em;
      }

      .expand-btn {
        border-radius: 999px;
        border: 1px solid #c6c2b8;
        background: #fff;
        color: #222;
        padding: 0.35rem 0.8rem;
        font-size: 0.78rem;
      }

      .storyline-text {
        white-space: pre-wrap;
        color: #3f423d;
        font-size: 0.94rem;
        line-height: 1.55;
      }

      .carousel-shell {
        margin-top: 1rem;
        background: rgba(255, 255, 255, 0.74);
        border: 1px solid rgba(30, 31, 28, 0.08);
        border-radius: 18px;
        padding: 1rem;
        box-shadow: 0 14px 34px rgba(20, 21, 19, 0.08);
      }

      .carousel-image-wrap {
        background: #ece8de;
        border-radius: 14px;
        overflow: hidden;
        border: 1px solid #d8d2c7;
      }

      .carousel-image {
        width: 100%;
        max-height: 72vh;
        object-fit: contain;
        background: #ece8de;
      }

      .panel-meta {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-top: 0.55rem;
      }

      .panel-index {
        color: var(--muted);
        font-size: 0.83rem;
      }

      .open-btn {
        border: 1px solid #b8b6b0;
        border-radius: 10px;
        background: #fff;
        color: #191a17;
        text-decoration: none;
        font-size: 0.82rem;
        padding: 0.32rem 0.66rem;
      }

      .carousel-control-prev,
      .carousel-control-next {
        width: 7%;
      }

      .carousel-control-prev-icon,
      .carousel-control-next-icon {
        filter: invert(1) grayscale(1) brightness(0);
      }

      .carousel-indicators [data-bs-target] {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background-color: #2f332d;
      }

      .fade-in {
        animation: fadeIn 420ms ease both;
      }

      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(6px); }
        to { opacity: 1; transform: translateY(0); }
      }

      @media (max-width: 767px) {
        .page-shell {
          padding-top: 1.3rem;
        }

        .hero {
          border-radius: 14px;
          padding: 1rem;
        }

        .carousel-control-prev,
        .carousel-control-next {
          width: 12%;
        }
      }
    </style>
  </head>
  <body>
    <main class="page-shell">
      <section class="hero fade-in">
        <div class="d-flex flex-column flex-md-row justify-content-between gap-3 align-items-md-end">
          <div>
            <div class="hero-kicker">Interactive Storyboards</div>
            <h1 class="hero-title">Comic Agent Story Gallery</h1>
          </div>
          <div class="control-row">
            <div class="selector-wrap">
              <label for="storySelect" class="form-label mb-1">Select Story</label>
              <select id="storySelect" class="form-select"></select>
            </div>
            <a
              class="repo-btn"
              href="https://github.com/baqiral-1/comic_agent"
              target="_blank"
              rel="noopener noreferrer"
            >
              View Repository
            </a>
          </div>
        </div>
      </section>

      <section class="story-card mt-3 fade-in" style="animation-delay: 90ms;">
        <div class="card-body p-3 p-md-4">
          <div class="story-head">
            <h2 class="story-title h5">Storyline</h2>
            <button
              class="expand-btn"
              type="button"
              data-bs-toggle="collapse"
              data-bs-target="#storylineCollapse"
              aria-expanded="false"
              aria-controls="storylineCollapse"
            >
              Expand Full Story
            </button>
          </div>
          <div id="storyPreview" class="storyline-text mt-3"></div>
          <div class="collapse mt-3" id="storylineCollapse">
            <div id="storyFull" class="storyline-text"></div>
          </div>
        </div>
      </section>

      <section class="carousel-shell fade-in" style="animation-delay: 170ms;">
        <div id="panelCarousel" class="carousel slide" data-bs-ride="false" data-bs-interval="false">
          <div class="carousel-indicators" id="panel-indicators"></div>
          <div class="carousel-inner" id="panel-slides"></div>
          <button class="carousel-control-prev" type="button" data-bs-target="#panelCarousel" data-bs-slide="prev">
            <span class="carousel-control-prev-icon" aria-hidden="true"></span>
            <span class="visually-hidden">Previous</span>
          </button>
          <button class="carousel-control-next" type="button" data-bs-target="#panelCarousel" data-bs-slide="next">
            <span class="carousel-control-next-icon" aria-hidden="true"></span>
            <span class="visually-hidden">Next</span>
          </button>
        </div>
      </section>
    </main>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
    <script>
      const stories = {
        nasruddin: {
          label: "Nasruddin",
          imageBase: "./images/with_scene_fixes_10/panels",
          panelFiles: ["panel-001.png", "panel-002.png", "panel-003.png", "panel-004.png"],
          preview: `Nasruddin was often sought out by the people of his town for advice. One day, one of his neighbors came to Nasruddin and lamented, "I'm really having trouble having my family live together in our small house. It's myself, my wife, my three kids, and my mother-in-law-all sharing the same little cottage. Nasruddin, you are a wise man. What do you think I should do?"

"Hmmm," thought Nasruddin for a minute. Then he asked, "Do you have any chickens in your yard?"

The man was a bit surprised by the question, but answered, "I have ten."`,
          full: `"Put them in the house," said Nasruddin.

"But Mullah," the man exclaimed. "Our house is already cramped as it is!"

"You asked me for my advice. This is my advice. Just try it," replied Nasruddin.

The man, desperate to find a solution to his woes, followed Nasruddin's advice. A couple of days later, he visited Nasruddin again.

"Mullah," he said in a pained voice, "things are even worse now. With the chickens in the house, we are even more pressed for space."

"Do you have any donkeys?" Nasruddin asked.

The neighbor was surprised again at this question. "I have one," he replied.

"Well then, take that donkey of yours and bring it in the house," Nasruddin advised.

The man's eyes widened and he bemoaned and objected. But after a while, Nasruddin convinced him to try his way.

A couple of days later, the man, now looking disheveled and more distressed than ever, came back to Nasruddin.

"Now my home is even more crowded! Between my family, the chickens, and that donkey of mine, there is barely any room to move. With all the noise and the smell of the animals, we can hardly sleep!" cried the neighbor.

"I see," Nasruddin said after a minute of thought. "Well then, do you have any other animals in your yard?"

"Yes," the man replied slowly, "we have a goat."

"Great," said the Mullah. "Take the goat in your house too."

The man blew up at Nasruddin in frustration. He fumed and fussed and seemed anything but eager to follow Nasruddin's advice. But once again, Nasruddin persuaded the man to try his idea one last time.

The very next day, the man, now fuming and angry, came up to Nasruddin and exclaimed, "My family is really upset now. Everyone is at my throat complaining about the lack of space. Your plan is a terrible one and is making us nothing but miserable. If you can't come up with an alternative idea, I'm going to let them come here themselves and have their way with you!"

"Perfect," Nasruddin replied, "it is now time to take all of the animals back outside."

With a big sigh of relief, the man followed Nasruddin's final advice.

The next day, as Nasruddin was going on his daily walks, he ran into the neighbor.

"So, how are things now?" Nasruddin asked.

The neighbor was beaming. "Mullah, your plan has worked like a charm! With all the animals out, my house is so spacious that we can't believe we complained about the cottage before. We're all living so happily now!"

Nasruddin smiled.`
        },
        tortoise: {
          label: "The Tortoise and the Hare",
          imageBase: "./images/tortoise/panels",
          panelFiles: ["panel-001.png", "panel-002.png", "panel-003.png", "panel-004.png"],
          preview: `Once upon a time, there was a hare who loved to boast of his speed in front of the other animals.
All the animals were surprised that the tortoise took up the challenge. He was known to be a very slow animal. However, a day was fixed for the great race and all the animals looked forward to it.`,
          full: `On the day of the race, no animal went to the market. No one went hunting, all the animals gathered together, excited to watch the race between the tortoise and the hare. Both animals were ready, each of them felt confident and everyone wondered why the tortoise was so confident since they felt he was no match for the hare.
The elephant started them off when he blew his big whistle and the sound rang across the entire jungle. Every ear was alert, every eye fixed on the two competitors. Who will win the greatest animal race in history?
The hare darted almost out of sight at once, but soon stopped. In order to show that the tortoise was no match for him and should not have accepted his challenge in the first instance, he lay down to have a nap.
Slowly but surely, the tortoise plodded on. He had a goal, he had a focus and he never looked back. When the hare awoke from his sleep, he saw the tortoise near the finish line. He jumped up and tried to catch up with him but it was too late. The deed had been done.
To the amazement of all the animals, the tortoise had crossed the finish line. It was unbelievable. The hare was humbled. He had no choice but to congratulate the tortoise and accept him as the winner. All the animals learnt a very important lesson from the tortoise.`
        },
        moses: {
          label: "Moses and the Red Sea",
          imageBase: "./images/moses/panels",
          panelFiles: [
            "panel-001.png",
            "panel-002.png",
            "panel-003.png",
            "panel-004.png",
            "panel-005.png",
            "panel-006.png",
            "panel-007.png",
            "panel-008.png",
            "panel-009.png",
            "panel-010.png",
            "panel-011.png",
            "panel-012.png"
          ],
          preview: `The wind smelled of salt and fear. Families stood at the edge of the Red Sea, with Pharaoh's chariots racing toward them.
Eli clung to his mother, and panic spread through the crowd as Moses prayed for God's help and called everyone to trust and move forward.`,
          full: `Moses raised his staff over the sea, and through the night a mighty wind split the waters into towering walls. The Israelites walked across on dry ground while a pillar of cloud protected them from the Egyptian army.
When Pharaoh's soldiers chased them into the path, confusion and fear overtook the chariots. After every Israelite reached safety, Moses stretched out his hand again, and the waters returned.
The sea closed over the army, and the people stood on the far shore in awe and gratitude. Miriam led songs of praise, and the nation celebrated that God had delivered them with power and mercy.

Read the full story text: ./images/moses/moses.txt`
        },
        rapunzel: {
          label: "Rapunzel",
          imageBase: "./images/rapunzel/panels",
          panelFiles: [
            "panel-001.png",
            "panel-002.png",
            "panel-003.png",
            "panel-004.png",
            "panel-005.png",
            "panel-006.png",
            "panel-007.png",
            "panel-008.png",
            "panel-009.png",
            "panel-010.png",
            "panel-011.png",
            "panel-012.png"
          ],
          preview: `Long ago, at the edge of a deep forest, a kind couple welcomed a baby girl named Rapunzel.
Taken by Dame Gothel and raised in a hidden tower, Rapunzel grows up longing for freedom until Prince Adrian hears her song and helps her find the courage to escape.`,
          full: `Dame Gothel kept Rapunzel isolated in a high tower and called it safety. Through secret visits, Prince Adrian showed Rapunzel a wider world, and together they planned her escape.
When Gothel discovered them, she cut Rapunzel's hair, destroyed the rope ladder, and exiled Rapunzel far away. Adrian was injured while searching for her, but neither gave up.
They eventually found each other again, healed, and traveled safely to Adrian's kingdom. Rapunzel chose a life defined by love, truth, and freedom, and she shared that lesson with every child who heard her story.

Read the full story text: ./images/rapunzel/rapunzel.txt`
        }
      };

      const selector = document.getElementById("storySelect");
      const storyPreview = document.getElementById("storyPreview");
      const storyFull = document.getElementById("storyFull");
      const indicators = document.getElementById("panel-indicators");
      const slides = document.getElementById("panel-slides");

      function buildSelector() {
        Object.entries(stories).forEach(([key, value]) => {
          const option = document.createElement("option");
          option.value = key;
          option.textContent = value.label;
          selector.appendChild(option);
        });
      }

      function renderStory(key) {
        const story = stories[key];
        if (!story) return;

        storyPreview.textContent = story.preview;
        storyFull.textContent = story.full;

        indicators.innerHTML = "";
        slides.innerHTML = "";

        story.panelFiles.forEach((file, index) => {
          const num = file.replace("panel-", "").replace(".png", "");
          const path = `${story.imageBase}/${file}`;

          const indicator = document.createElement("button");
          indicator.type = "button";
          indicator.setAttribute("data-bs-target", "#panelCarousel");
          indicator.setAttribute("data-bs-slide-to", String(index));
          indicator.setAttribute("aria-label", `Slide ${index + 1}`);
          if (index === 0) {
            indicator.className = "active";
            indicator.setAttribute("aria-current", "true");
          }
          indicators.appendChild(indicator);

          const slide = document.createElement("div");
          slide.className = `carousel-item${index === 0 ? " active" : ""}`;
          slide.innerHTML = `
            <div class="carousel-image-wrap">
              <img src="${path}" class="d-block carousel-image" alt="Panel ${num}" loading="lazy" />
            </div>
            <div class="panel-meta">
              <strong>Panel ${num}</strong>
              <a href="${path}" class="open-btn">Open Image</a>
            </div>
            <div class="panel-index mt-1">
              ${index + 1} / ${story.panelFiles.length}
            </div>
          `;
          slides.appendChild(slide);
        });
      }

      buildSelector();
      selector.value = "nasruddin";
      renderStory(selector.value);
      selector.addEventListener("change", () => renderStory(selector.value));
    </script>
  </body>
</html>
