<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>comic-agent | with_scene_fixes_3</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <style>
      body { background: #f8f9fa; }
      .panel-img { width: 100%; height: 260px; object-fit: cover; background: #e9ecef; }
    </style>
  </head>
  <body>
    <div class="container py-4 py-md-5">
      <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3 mb-4">
        <div>
          <h1 class="h3 mb-1">comic-agent Output Gallery</h1>
          <p class="text-secondary mb-0">Run: <code>with_scene_fixes_3</code></p>
        </div>
        <div class="d-flex gap-2">
          <a class="btn btn-primary" href="./images/with_scene_fixes_3/panels.pdf">Download PDF</a>
          <a class="btn btn-outline-secondary" href="./images/with_scene_fixes_3/manifest.json">Manifest JSON</a>
        </div>
      </div>

      <div class="alert alert-light border mb-4">
        Source path: <code>/tmp/comic_agent_mn/with_scene_fixes_3</code>
      </div>

      <div class="row g-3" id="panel-grid"></div>
    </div>

    <script>
      const panelFiles = [
        "panel-001.png",
        "panel-002.png",
        "panel-003.png",
        "panel-004.png",
        "panel-005.png",
        "panel-006.png",
        "panel-007.png",
        "panel-008.png",
        "panel-009.png",
        "panel-010.png",
        "panel-011.png",
        "panel-012.png",
      ];

      const panelGrid = document.getElementById("panel-grid");
      for (const file of panelFiles) {
        const num = file.replace("panel-", "").replace(".png", "");
        const path = `./images/with_scene_fixes_3/${file}`;
        const card = document.createElement("div");
        card.className = "col-12 col-sm-6 col-lg-4";
        card.innerHTML = `
          <div class="card shadow-sm h-100">
            <img src="${path}" class="card-img-top panel-img" alt="Panel ${num}" loading="lazy" />
            <div class="card-body py-2">
              <h2 class="h6 mb-0">Panel ${num}</h2>
            </div>
            <div class="card-footer bg-white">
              <a href="${path}" class="btn btn-sm btn-outline-primary">Open Image</a>
            </div>
          </div>
        `;
        panelGrid.appendChild(card);
      }
    </script>
  </body>
</html>
